<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 10px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 600px;
      padding: 40px;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      font-size: 28px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      padding: 12px 24px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    button:active {
      transform: scale(0.98);
    }

    .tasks-list {
      margin-top: 30px;
    }

    .task-item {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 15px;
      background: #f5f5f5;
      border-radius: 5px;
      margin-bottom: 10px;
      transition: background 0.3s;
    }

    .task-item:hover {
      background: #efefef;
    }

    .task-item.completed {
      opacity: 0.6;
    }

    .task-item.completed .task-text {
      text-decoration: line-through;
      color: #999;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
    }

    .task-text {
      flex: 1;
      color: #333;
      font-size: 14px;
    }

    .delete-btn {
      background: #ff6b6b;
      padding: 8px 12px;
      font-size: 12px;
    }

    .delete-btn:hover {
      background: #ff5252;
    }

    .status {
      text-align: center;
      margin-top: 20px;
      padding: 10px;
      border-radius: 5px;
      font-size: 12px;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    .status.loading {
      background: #d1ecf1;
      color: #0c5460;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .empty-state p {
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Task Manager</h1>
    
    <div class="input-group">
      <input 
        type="text" 
        id="taskInput" 
        placeholder="Add a new task..." 
        autocomplete="off"
      >
      <button id="addBtn">Add Task</button>
    </div>

    <div id="status" class="status" style="display: none;"></div>

    <div class="tasks-list" id="tasksList">
      <div class="empty-state">
        <p>No tasks yet. Create one to get started!</p>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    const taskInput = document.getElementById('taskInput');
    const addBtn = document.getElementById('addBtn');
    const tasksList = document.getElementById('tasksList');
    const statusDiv = document.getElementById('status');

    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
      statusDiv.style.display = 'block';
      setTimeout(() => {
        statusDiv.style.display = 'none';
      }, 3000);
    }

    async function fetchTasks() {
      try {
        const response = await fetch(`${API_URL}/tasks`);
        const tasks = await response.json();
        renderTasks(tasks);
      } catch (error) {
        console.error('Error fetching tasks:', error);
        showStatus('Error loading tasks', 'error');
      }
    }

    function renderTasks(tasks) {
      if (tasks.length === 0) {
        tasksList.innerHTML = '<div class="empty-state"><p>No tasks yet. Create one to get started!</p></div>';
        return;
      }

      tasksList.innerHTML = tasks.map(task => `
        <div class="task-item ${task.completed ? 'completed' : ''}">
          <input 
            type="checkbox" 
            ${task.completed ? 'checked' : ''}
            onchange="toggleTask('${task._id}', this.checked)"
          >
          <span class="task-text">${escapeHtml(task.title)}</span>
          <button class="delete-btn" onclick="deleteTask('${task._id}')">Delete</button>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function addTask() {
      const title = taskInput.value.trim();
      if (!title) {
        showStatus('Please enter a task title', 'error');
        return;
      }

      try {
        const response = await fetch(`${API_URL}/tasks`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title })
        });

        if (!response.ok) throw new Error('Failed to add task');
        
        taskInput.value = '';
        showStatus('Task added successfully', 'success');
        fetchTasks();
      } catch (error) {
        console.error('Error adding task:', error);
        showStatus('Error adding task', 'error');
      }
    }

    async function toggleTask(id, completed) {
      try {
        await fetch(`${API_URL}/tasks/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ completed })
        });
        fetchTasks();
      } catch (error) {
        console.error('Error updating task:', error);
        showStatus('Error updating task', 'error');
      }
    }

    async function deleteTask(id) {
      if (!confirm('Are you sure you want to delete this task?')) return;

      try {
        await fetch(`${API_URL}/tasks/${id}`, {
          method: 'DELETE'
        });
        showStatus('Task deleted', 'success');
        fetchTasks();
      } catch (error) {
        console.error('Error deleting task:', error);
        showStatus('Error deleting task', 'error');
      }
    }

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') addTask();
    });

    // Load tasks on page load
    fetchTasks();
  </script>
</body>
</html>
